<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="512" height="512" rx="92" fill="#1a1a2e"/>
  <!-- Snowflake -->
  <g fill="#7ec8e3" stroke="#7ec8e3" stroke-linecap="round">
    <!-- Center circle -->
    <circle cx="256" cy="256" r="20"/>
    <!-- 6 arms -->
    <line x1="256" y1="100" x2="256" y2="412" stroke-width="18"/>
    <line x1="256" y1="100" x2="256" y2="412" stroke-width="18" transform="rotate(60 256 256)"/>
    <line x1="256" y1="100" x2="256" y2="412" stroke-width="18" transform="rotate(120 256 256)"/>
    <!-- Branch tips -->
    <line x1="256" y1="148" x2="220" y2="112" stroke-width="12"/>
    <line x1="256" y1="148" x2="292" y2="112" stroke-width="12"/>
    <line x1="256" y1="364" x2="220" y2="400" stroke-width="12"/>
    <line x1="256" y1="364" x2="292" y2="400" stroke-width="12"/>
    <!-- Mid branches -->
    <line x1="256" y1="196" x2="210" y2="156" stroke-width="10"/>
    <line x1="256" y1="196" x2="302" y2="156" stroke-width="10"/>
    <line x1="256" y1="316" x2="210" y2="356" stroke-width="10"/>
    <line x1="256" y1="316" x2="302" y2="356" stroke-width="10"/>
    <!-- Rotated arm branches -->
    <line x1="256" y1="148" x2="220" y2="112" stroke-width="12" transform="rotate(60 256 256)"/>
    <line x1="256" y1="148" x2="292" y2="112" stroke-width="12" transform="rotate(60 256 256)"/>
    <line x1="256" y1="364" x2="220" y2="400" stroke-width="12" transform="rotate(60 256 256)"/>
    <line x1="256" y1="364" x2="292" y2="400" stroke-width="12" transform="rotate(60 256 256)"/>
    <line x1="256" y1="196" x2="210" y2="156" stroke-width="10" transform="rotate(60 256 256)"/>
    <line x1="256" y1="196" x2="302" y2="156" stroke-width="10" transform="rotate(60 256 256)"/>
    <line x1="256" y1="316" x2="210" y2="356" stroke-width="10" transform="rotate(60 256 256)"/>
    <line x1="256" y1="316" x2="302" y2="356" stroke-width="10" transform="rotate(60 256 256)"/>
    <line x1="256" y1="148" x2="220" y2="112" stroke-width="12" transform="rotate(120 256 256)"/>
    <line x1="256" y1="148" x2="292" y2="112" stroke-width="12" transform="rotate(120 256 256)"/>
    <line x1="256" y1="364" x2="220" y2="400" stroke-width="12" transform="rotate(120 256 256)"/>
    <line x1="256" y1="364" x2="292" y2="400" stroke-width="12" transform="rotate(120 256 256)"/>
    <line x1="256" y1="196" x2="210" y2="156" stroke-width="10" transform="rotate(120 256 256)"/>
    <line x1="256" y1="196" x2="302" y2="156" stroke-width="10" transform="rotate(120 256 256)"/>
    <line x1="256" y1="316" x2="210" y2="356" stroke-width="10" transform="rotate(120 256 256)"/>
    <line x1="256" y1="316" x2="302" y2="356" stroke-width="10" transform="rotate(120 256 256)"/>
  </g>
</svg>
